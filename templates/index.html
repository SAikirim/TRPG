<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>판타지 TRPG - 잃어버린 보물의 숲 던전</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
        header {
            background: linear-gradient(135deg, #16213e, #0f3460);
            padding: 12px 24px;
            text-align: center;
            border-bottom: 2px solid #e94560;
        }
        header h1 { font-size: 1.4em; color: #e94560; }
        header p { font-size: 0.85em; color: #aaa; margin-top: 4px; }
        .container {
            display: flex;
            gap: 16px;
            padding: 16px;
            max-width: 1400px;
            margin: 0 auto;
            min-height: calc(100vh - 80px);
        }
        .main-panel {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-width: 0;
        }
        .sidebar {
            width: 380px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            max-height: calc(100vh - 96px);
        }
        .panel {
            background: #16213e;
            border-radius: 12px;
            padding: 14px;
        }
        .panel h3 {
            font-size: 0.95em;
            color: #e94560;
            margin-bottom: 10px;
            border-bottom: 1px solid #333;
            padding-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        /* Player cards */
        .player-card {
            background: #0f3460;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            display: flex;
            gap: 10px;
        }
        .player-card:last-child { margin-bottom: 0; }
        .player-card .name {
            font-weight: bold;
            font-size: 0.95em;
            margin-bottom: 6px;
        }
        .player-card .name .class-badge {
            font-size: 0.75em;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 6px;
        }
        .class-warrior { background: #e63946; }
        .class-mage { background: #457be0; }
        .class-rogue { background: #2ecc71; }
        .bar-container {
            background: #1a1a2e;
            border-radius: 4px;
            height: 16px;
            margin: 3px 0;
            position: relative;
            overflow: hidden;
        }
        .bar {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s;
        }
        .bar-hp { background: linear-gradient(90deg, #e63946, #ff6b6b); }
        .bar-mp { background: linear-gradient(90deg, #457be0, #74b9ff); }
        .bar-label {
            position: absolute;
            top: 0; left: 8px;
            font-size: 0.7em;
            line-height: 16px;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
        .stats {
            display: flex;
            gap: 8px;
            margin-top: 6px;
            font-size: 0.75em;
            color: #aaa;
        }
        .stats span { background: #1a1a2e; padding: 2px 6px; border-radius: 4px; }
        .player-portrait {
            width: 125px;
            height: 125px;
            border-radius: 8px;
            border: 2px solid #333;
            object-fit: cover;
            flex-shrink: 0;
        }
        .player-info {
            flex: 1;
            min-width: 0;
        }
        /* Illustration */
        .illustration-section .illustration-panel {
            position: relative;
            min-height: 400px;
            background: #0d1b2a;
            border-radius: 8px;
            overflow: hidden;
        }
        .illustration-panel .bg-layer {
            width: 100%;
            max-height: 500px;
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }
        .illustration-panel .layer-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .illustration-panel .portrait-layer {
            position: absolute;
            bottom: 0;
            max-height: 90%;
            max-width: 40%;
            object-fit: contain;
            filter: drop-shadow(2px 2px 8px rgba(0,0,0,0.7));
        }
        .portrait-layer.pos-left { left: 5%; }
        .portrait-layer.pos-center { left: 50%; transform: translateX(-50%); }
        .portrait-layer.pos-right { right: 5%; }
        .illustration-panel .object-layer {
            position: absolute;
            max-height: 30%;
            max-width: 25%;
            object-fit: contain;
            filter: drop-shadow(2px 2px 6px rgba(0,0,0,0.6));
        }
        .object-layer.pos-center { bottom: 10%; left: 50%; transform: translateX(-50%); }
        .object-layer.pos-center-bottom { bottom: 5%; left: 50%; transform: translateX(-50%); }
        .object-layer.pos-left { bottom: 10%; left: 10%; }
        .object-layer.pos-right { bottom: 10%; right: 10%; }
        .illustration-panel .generating-overlay {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            padding: 6px 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            color: #ffd700;
            font-size: 0.8em;
            font-style: italic;
        }
        .generating-overlay .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #333;
            border-top: 2px solid #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 6px;
        }
        .illustration-placeholder {
            color: #444;
            font-size: 1.1em;
            font-style: italic;
        }
        .illustration-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffd700;
            font-style: italic;
        }
        .illustration-loading .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #333;
            border-top: 3px solid #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .sd-toggle {
            font-size: 0.75em;
            cursor: pointer;
            padding: 2px 10px;
            border-radius: 8px;
            border: 1px solid #555;
            background: #1a1a2e;
            color: #aaa;
            flex-shrink: 0;
        }
        .sd-toggle.active {
            background: #2ecc71;
            color: white;
            border-color: #27ae60;
        }
        /* Events */
        .events-list {
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.85em;
        }
        .event-item {
            padding: 6px 8px;
            border-bottom: 1px solid #1a1a2e;
            line-height: 1.4;
        }
        .event-item .turn-badge {
            display: inline-block;
            background: #e94560;
            color: white;
            font-size: 0.7em;
            padding: 1px 6px;
            border-radius: 8px;
            margin-right: 6px;
        }
        .event-item .narrative {
            display: block;
            color: #ffd700;
            font-style: italic;
            margin-top: 3px;
        }
        /* Map in sidebar */
        .sidebar-map img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            border: 2px solid #333;
            image-rendering: pixelated;
        }
        /* Legend */
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 0.78em;
            margin-top: 10px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 1px solid white;
        }
        .legend-tri {
            width: 0; height: 0;
            border-left: 7px solid transparent;
            border-right: 7px solid transparent;
            border-bottom: 12px solid #9b30ff;
        }
    </style>
</head>
<body>
    <header>
        <h1>판타지 TRPG - 잃어버린 보물의 숲 던전</h1>
        <p>3명의 모험가가 숲의 던전에서 잃어버린 보물을 찾는다</p>
    </header>

    <div class="container">
        <div class="main-panel">
            <div class="panel illustration-section">
                <h3>
                    일러스트
                    <button id="sd-toggle" class="sd-toggle" onclick="toggleSD()">SD OFF</button>
                </h3>
                <div id="illustration-panel" class="illustration-panel">
                    <div class="illustration-placeholder">대기 중...</div>
                </div>
            </div>
            <div class="panel">
                <h3>이벤트 로그</h3>
                <div id="events-list" class="events-list"></div>
            </div>
        </div>

        <div class="sidebar">
            <div class="panel sidebar-map">
                <h3>게임 맵</h3>
                <img id="game-map" src="/static/map.png" alt="Game Map">
                <div class="legend">
                    <div class="legend-item"><div class="legend-dot" style="background:#e63946"></div> 전사 (아론)</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#457be0"></div> 마법사 (리나)</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#2ecc71"></div> 도적 (카이)</div>
                    <div class="legend-item"><div class="legend-tri"></div> 몬스터</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#4a8c2a"></div> 숲</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#6b6b6b"></div> 던전</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#c8a82a"></div> 보물실</div>
                </div>
            </div>

            <div class="panel">
                <h3>플레이어 정보</h3>
                <div id="players-list"></div>
            </div>
        </div>
    </div>

    <script>
        let gameState = null;

        async function updateGameState() {
            try {
                const res = await fetch('/api/game-state');
                gameState = await res.json();
                const turnEl = document.getElementById('turn-count');
                if (turnEl) turnEl.textContent = gameState.turn_count;
                const connEl = document.getElementById('connection-status');
                if (connEl) { connEl.textContent = '연결됨'; connEl.className = 'status-indicator connected'; }
                updatePlayersList();
                updateEventsList();
                document.getElementById('game-map').src = '/static/map.png?t=' + Date.now();
                updateIllustration();
            } catch (e) {
                const connEl = document.getElementById('connection-status');
                if (connEl) { connEl.textContent = '연결 끊김'; connEl.className = 'status-indicator'; }
            }
        }

        function updatePlayersList() {
            const container = document.getElementById('players-list');
            const classMap = { '전사': 'warrior', '마법사': 'mage', '도적': 'rogue' };
            container.innerHTML = gameState.players.map(p => {
                const cls = classMap[p.class] || 'warrior';
                const hpPct = (p.hp / p.max_hp * 100).toFixed(0);
                const mpPct = (p.mp / p.max_mp * 100).toFixed(0);
                const effects = p.status_effects.length > 0
                    ? `<div style="font-size:0.75em;color:#ffd700;margin-top:4px">상태: ${p.status_effects.join(', ')}</div>`
                    : '';
                return `
                <div class="player-card">
                    <img class="player-portrait" src="/static/portraits/pixel/player_${p.id}.png" alt="${p.name}" onerror="this.src='/static/portraits/pixel/player_${p.id}.png'">
                    <div class="player-info">
                        <div class="name">
                        ${p.name}
                        <span class="class-badge class-${cls}">${p.class}</span>
                        <span style="float:right;font-size:0.75em;color:#aaa">위치: [${p.position}]</span>
                    </div>
                    <div class="bar-container">
                        <div class="bar bar-hp" style="width:${hpPct}%"></div>
                        <div class="bar-label">HP ${p.hp}/${p.max_hp}</div>
                    </div>
                    <div class="bar-container">
                        <div class="bar bar-mp" style="width:${mpPct}%"></div>
                        <div class="bar-label">MP ${p.mp}/${p.max_mp}</div>
                    </div>
                    <div class="stats">
                        <span>STR ${p.stats.STR}</span>
                        <span>DEX ${p.stats.DEX}</span>
                        <span>INT ${p.stats.INT}</span>
                        <span>CON ${p.stats.CON}</span>
                    </div>
                    ${effects}
                    </div>
                </div>`;
            }).join('');
        }

        function updateEventsList() {
            const container = document.getElementById('events-list');
            const events = gameState.events.slice(-10).reverse();
            container.innerHTML = events.map(e => {
                const narrative = e.narrative ? `<span class="narrative">${e.narrative}</span>` : '';
                return `
                <div class="event-item">
                    <span class="turn-badge">T${e.turn}</span>
                    ${e.message}
                    ${narrative}
                </div>`;
            }).join('');
        }

        let lastSceneHash = '';

        async function updateIllustration() {
            try {
                const res = await fetch('/api/illustration');
                const data = await res.json();
                const panel = document.getElementById('illustration-panel');
                const toggleBtn = document.getElementById('sd-toggle');

                if (data.enabled) {
                    toggleBtn.textContent = 'SD ON';
                    toggleBtn.className = 'sd-toggle active';
                } else {
                    toggleBtn.textContent = 'SD OFF';
                    toggleBtn.className = 'sd-toggle';
                }

                // Build a hash to detect changes
                const sceneHash = JSON.stringify({
                    bg: data.background,
                    layers: data.layers,
                    status: data.generating?.status,
                    default_bg: data.default_bg,
                    enabled: data.enabled
                });

                if (sceneHash === lastSceneHash) return;
                lastSceneHash = sceneHash;

                const generating = data.generating || {};
                const hasContent = data.background || (data.layers && data.layers.length > 0);

                if (!data.enabled) {
                    if (data.default_bg) {
                        panel.innerHTML = '<img class="bg-layer" src="' + data.default_bg.pixel + '?t=default" alt="Background">';
                    } else {
                        panel.innerHTML = '<div class="illustration-placeholder">SD 비활성</div>';
                    }
                    return;
                }

                if (!hasContent && generating.status !== 'generating') {
                    if (generating.status === 'error' && generating.error) {
                        const errorDiv = document.createElement('div');
                        errorDiv.style.cssText = 'color:#e63946;font-size:0.9em;padding:20px;text-align:center';
                        errorDiv.textContent = '오류: ' + generating.error;
                        panel.innerHTML = '';
                        panel.appendChild(errorDiv);
                    } else if (data.default_bg) {
                        // Show default chapter background
                        const bgSrc = data.enabled ? data.default_bg.sd : data.default_bg.pixel;
                        const fallbackSrc = data.default_bg.pixel;
                        panel.innerHTML = '<img class="bg-layer" src="' + bgSrc + '?t=default" alt="Background" onerror="this.src=\'' + fallbackSrc + '?t=default\'">';
                    } else {
                        panel.innerHTML = '<div class="illustration-placeholder">대기 중...</div>';
                    }
                    return;
                }

                // Build scene with layers
                let html = '';

                if (data.background) {
                    html += '<img class="bg-layer" src="' + data.background + '?t=' + Date.now() + '" alt="Background">';
                }

                if (data.layers && data.layers.length > 0) {
                    html += '<div class="layer-container">';
                    data.layers.forEach(layer => {
                        const posClass = 'pos-' + (layer.position || 'center');
                        if (layer.type === 'portrait') {
                            html += '<img class="portrait-layer ' + posClass + '" src="' + layer.image + '?t=' + Date.now() + '" alt="' + (layer.name || '') + '" title="' + (layer.name || '') + '">';
                        } else if (layer.type === 'object') {
                            html += '<img class="object-layer ' + posClass + '" src="' + layer.image + '?t=' + Date.now() + '" alt="' + (layer.name || '') + '" title="' + (layer.name || '') + '">';
                        }
                    });
                    html += '</div>';
                }

                // Show generating overlay if something is being generated while scene is visible
                if (generating.status === 'generating') {
                    if (hasContent) {
                        html += '<div class="generating-overlay"><div class="spinner"></div>생성 중...</div>';
                    } else {
                        html = '<div class="illustration-loading"><div class="spinner"></div>생성 중...</div>';
                    }
                }

                panel.innerHTML = html;
            } catch (e) {}
        }

        async function toggleSD() {
            try {
                await fetch('/api/illustration/toggle', { method: 'POST' });
                await updateIllustration();
            } catch (e) {
                console.error('Toggle failed:', e);
            }
        }

        updateGameState();
        setInterval(updateGameState, 2000);
    </script>
</body>
</html>
