<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRPG - 잃어버린 보물의 숲 던전</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
        header {
            background: linear-gradient(135deg, #16213e, #0f3460);
            padding: 12px 24px;
            text-align: center;
            border-bottom: 2px solid #e94560;
        }
        header h1 { font-size: 1.4em; color: #e94560; }
        header p { font-size: 0.85em; color: #aaa; margin-top: 4px; }
        .status-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 6px;
            font-size: 0.8em;
            color: #888;
        }
        .status-bar .ending { color: #ffd700; font-weight: bold; }
        .container {
            display: flex;
            gap: 16px;
            padding: 16px;
            max-width: 1400px;
            margin: 0 auto;
            min-height: calc(100vh - 100px);
        }
        /* Mobile: single column */
        @media (max-width: 900px) {
            .container {
                flex-direction: column;
            }
            .sidebar {
                width: 100% !important;
                max-height: none !important;
            }
            .illustration-panel {
                min-height: 250px !important;
            }
        }
        .main-panel {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-width: 0;
        }
        .sidebar {
            width: 380px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            max-height: calc(100vh - 116px);
        }
        .panel {
            background: #16213e;
            border-radius: 12px;
            padding: 14px;
        }
        .panel h3 {
            font-size: 0.95em;
            color: #e94560;
            margin-bottom: 10px;
            border-bottom: 1px solid #333;
            padding-bottom: 6px;
        }
        /* Player cards */
        .player-card {
            background: #0f3460;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            display: flex;
            gap: 10px;
        }
        .player-card:last-child { margin-bottom: 0; }
        .player-card .name {
            font-weight: bold;
            font-size: 0.95em;
            margin-bottom: 6px;
        }
        .player-card .name .class-badge {
            font-size: 0.75em;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 6px;
        }
        .class-warrior { background: #e63946; }
        .class-mage { background: #457be0; }
        .class-rogue { background: #2ecc71; }
        .bar-container {
            background: #1a1a2e;
            border-radius: 4px;
            height: 16px;
            margin: 3px 0;
            position: relative;
            overflow: hidden;
        }
        .bar {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s;
        }
        .bar-hp { background: linear-gradient(90deg, #e63946, #ff6b6b); }
        .bar-mp { background: linear-gradient(90deg, #457be0, #74b9ff); }
        .bar-label {
            position: absolute;
            top: 0; left: 8px;
            font-size: 0.7em;
            line-height: 16px;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
        .stats {
            display: flex;
            gap: 8px;
            margin-top: 6px;
            font-size: 0.75em;
            color: #aaa;
        }
        .stats span { background: #1a1a2e; padding: 2px 6px; border-radius: 4px; }
        /* Collapsible details */
        .detail-toggle {
            display: flex;
            gap: 4px;
            margin-top: 6px;
        }
        .detail-toggle button {
            flex: 1;
            background: #1a1a2e;
            border: 1px solid #333;
            color: #aaa;
            font-size: 0.7em;
            padding: 3px 0;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .detail-toggle button:hover,
        .detail-toggle button.active {
            background: #0f3460;
            color: #ffd700;
            border-color: #ffd700;
        }
        .detail-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            margin-top: 0;
        }
        .detail-content.open {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 6px;
        }
        .detail-content ul {
            list-style: none;
            font-size: 0.75em;
            color: #ccc;
        }
        .detail-content li {
            padding: 2px 6px;
            border-bottom: 1px solid #1a1a2e;
        }
        .detail-content li:last-child { border-bottom: none; }
        .detail-content .skill-item { color: #74b9ff; }
        .player-portrait {
            width: 100px;
            height: 100px;
            border-radius: 8px;
            border: 2px solid #333;
            object-fit: cover;
            flex-shrink: 0;
        }
        .player-info { flex: 1; min-width: 0; }
        /* Illustration */
        .illustration-panel {
            position: relative;
            min-height: 400px;
            background: #0d1b2a;
            border-radius: 8px;
            overflow: hidden;
        }
        .illustration-panel img.bg-layer {
            width: 100%;
            max-height: 500px;
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }
        .illustration-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: #444;
            font-size: 1.1em;
            font-style: italic;
        }
        /* Events */
        .events-list {
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.85em;
        }
        .event-item {
            padding: 6px 8px;
            border-bottom: 1px solid #1a1a2e;
            line-height: 1.4;
        }
        .event-item .turn-badge {
            display: inline-block;
            background: #e94560;
            color: white;
            font-size: 0.7em;
            padding: 1px 6px;
            border-radius: 8px;
            margin-right: 6px;
        }
        .event-item .narrative {
            display: block;
            color: #ffd700;
            font-style: italic;
            margin-top: 3px;
        }
        /* Map */
        .sidebar-map img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            border: 2px solid #333;
        }
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 0.78em;
            margin-top: 10px;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .legend-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            border: 1px solid white;
        }
        /* (inventory-list replaced by collapsible detail-content) */
        .reload-hint {
            text-align: center;
            font-size: 0.75em;
            color: #555;
            padding: 8px;
        }
    </style>
</head>
<body>
    <header>
        <h1 id="game-title">TRPG</h1>
        <p id="game-desc"></p>
        <div class="status-bar">
            <span>턴: <strong id="turn-count">-</strong></span>
            <span>챕터: <strong id="chapter-info">-</strong></span>
            <span id="ending-info" class="ending" style="display:none"></span>
        </div>
    </header>

    <div class="container">
        <div class="main-panel">
            <div class="panel illustration-section">
                <h3>일러스트</h3>
                <div id="illustration-panel" class="illustration-panel">
                    <div class="illustration-placeholder">로딩 중...</div>
                </div>
            </div>
            <div class="panel">
                <h3>이벤트 로그</h3>
                <div id="events-list" class="events-list"></div>
            </div>
        </div>

        <div class="sidebar">
            <div class="panel sidebar-map">
                <h3>게임 맵</h3>
                <img id="game-map" src="static/map.png" alt="Game Map">
                <div class="legend">
                    <div class="legend-item"><div class="legend-dot" style="background:#457be0"></div> 사이키</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#2ecc71"></div> 루체나</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#e63946"></div> 노을</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#4a8c2a"></div> 숲</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#6b6b6b"></div> 던전</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#c8a82a"></div> 보물실</div>
                </div>
            </div>
            <div class="panel">
                <h3>플레이어 정보</h3>
                <div id="players-list"></div>
            </div>
        </div>
    </div>

    <div class="reload-hint">페이지를 새로고침하면 최신 상태로 업데이트됩니다</div>

    <script>
        async function loadGame() {
            try {
                const res = await fetch('game_state.json');
                const state = await res.json();
                renderGame(state);
            } catch (e) {
                document.getElementById('game-title').textContent = 'TRPG - 로딩 실패';
                console.error(e);
            }
        }

        function renderGame(state) {
            const info = state.game_info;
            document.getElementById('game-title').textContent = info.title;
            document.getElementById('game-desc').textContent = info.scenario;
            document.getElementById('turn-count').textContent = state.turn_count;
            document.getElementById('chapter-info').textContent = info.current_chapter;

            if (info.ending) {
                const el = document.getElementById('ending-info');
                const endings = { perfect: '완벽한 승리', bittersweet: '쓰라린 승리', retreat: '전략적 후퇴', defeat: '어둠 속으로' };
                el.textContent = endings[info.ending] || info.ending;
                el.style.display = 'inline';
            }

            renderPlayers(state.players, info.scenario_id || 'lost_treasure');
            renderEvents(state.events);
            renderIllustration(info.current_chapter);
        }

        const playerDetailCache = {};

        function renderPlayers(players, scenarioId) {
            const container = document.getElementById('players-list');
            const classMap = { '전사': 'warrior', '마법사': 'mage', '도적': 'rogue' };
            container.innerHTML = players.map(p => {
                const cls = classMap[p.class] || 'warrior';
                const hpPct = (p.hp / p.max_hp * 100).toFixed(0);
                const mpPct = (p.mp / p.max_mp * 100).toFixed(0);
                const invItems = (p.inventory || []).map(i => `<li>${i}</li>`).join('') || '<li style="color:#666">없음</li>';
                return `
                <div class="player-card">
                    <img class="player-portrait" src="static/portraits/pixel/player_${p.id}.png" alt="${p.name}">
                    <div class="player-info">
                        <div class="name">
                            ${p.name}
                            <span class="class-badge class-${cls}">${p.class}</span>
                        </div>
                        <div class="bar-container">
                            <div class="bar bar-hp" style="width:${hpPct}%"></div>
                            <div class="bar-label">HP ${p.hp}/${p.max_hp}</div>
                        </div>
                        <div class="bar-container">
                            <div class="bar bar-mp" style="width:${mpPct}%"></div>
                            <div class="bar-label">MP ${p.mp}/${p.max_mp}</div>
                        </div>
                        <div class="stats">
                            <span>STR ${p.stats.STR}</span>
                            <span>DEX ${p.stats.DEX}</span>
                            <span>INT ${p.stats.INT}</span>
                            <span>CON ${p.stats.CON}</span>
                        </div>
                        <div class="detail-toggle">
                            <button onclick="toggleDetail(${p.id}, 'inv', this, '${scenarioId}')">소지품 (${(p.inventory||[]).length})</button>
                            <button onclick="toggleDetail(${p.id}, 'skill', this, '${scenarioId}')">스킬</button>
                            <button onclick="toggleDetail(${p.id}, 'equip', this, '${scenarioId}')">장비</button>
                        </div>
                        <div id="detail-inv-${p.id}" class="detail-content">
                            <ul>${invItems}</ul>
                        </div>
                        <div id="detail-skill-${p.id}" class="detail-content">
                            <ul><li style="color:#666">...</li></ul>
                        </div>
                        <div id="detail-equip-${p.id}" class="detail-content">
                            <ul><li style="color:#666">...</li></ul>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        async function toggleDetail(playerId, type, btn, scenarioId) {
            const el = document.getElementById(`detail-${type}-${playerId}`);
            const isOpen = el.classList.contains('open');

            ['inv', 'skill', 'equip'].forEach(t => {
                const d = document.getElementById(`detail-${t}-${playerId}`);
                if (d) d.classList.remove('open');
            });
            btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));

            if (isOpen) return;

            el.classList.add('open');
            btn.classList.add('active');

            // Lazy load from entity JSON file (static) or API (localhost)
            if ((type === 'skill' || type === 'equip') && !playerDetailCache[playerId]) {
                try {
                    const isStatic = location.hostname.includes('github.io') || !location.port;
                    const url = isStatic
                        ? `entities/${scenarioId}/players/player_${playerId}.json`
                        : `/api/player-stats/${playerId}`;
                    const res = await fetch(url);
                    playerDetailCache[playerId] = await res.json();
                } catch(e) {
                    playerDetailCache[playerId] = {};
                }
            }

            if (type === 'skill' && playerDetailCache[playerId]) {
                const skills = playerDetailCache[playerId].available_actions || [];
                el.innerHTML = skills.length
                    ? '<ul>' + skills.map(s => `<li class="skill-item">${s}</li>`).join('') + '</ul>'
                    : '<ul><li style="color:#666">없음</li></ul>';
            }
            if (type === 'equip' && playerDetailCache[playerId]) {
                const eq = playerDetailCache[playerId].equipment || {};
                const items = Object.entries(eq)
                    .filter(([k,v]) => v)
                    .map(([k,v]) => `<li>${k === 'weapon' ? '무기' : k === 'armor' ? '방어구' : k}: ${v}</li>`);
                el.innerHTML = items.length
                    ? '<ul>' + items.join('') + '</ul>'
                    : '<ul><li style="color:#666">없음</li></ul>';
            }
        }

        function renderEvents(events) {
            const container = document.getElementById('events-list');
            container.innerHTML = events.slice(-10).reverse().map(e => {
                const narrative = e.narrative ? `<span class="narrative">${e.narrative}</span>` : '';
                return `
                <div class="event-item">
                    <span class="turn-badge">T${e.turn}</span>
                    ${e.message}
                    ${narrative}
                </div>`;
            }).join('');
        }

        function renderIllustration(chapter) {
            const panel = document.getElementById('illustration-panel');
            const chapterBgs = {
                1: 'static/illustrations/sd/ch1_forest.png',
                2: 'static/illustrations/sd/ch2_dungeon.png',
                3: 'static/illustrations/sd/ch3_treasure.png'
            };
            const bg = chapterBgs[chapter];
            if (bg) {
                panel.innerHTML = `<img class="bg-layer" src="${bg}" alt="Chapter ${chapter}">`;
            } else {
                panel.innerHTML = '<div class="illustration-placeholder">일러스트 없음</div>';
            }
        }

        loadGame();
    </script>
</body>
</html>
