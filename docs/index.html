<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRPG - 잃어버린 보물의 숲 던전</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
        header {
            background: linear-gradient(135deg, #16213e, #0f3460);
            padding: 12px 24px;
            text-align: center;
            border-bottom: 2px solid #e94560;
        }
        header h1 { font-size: 1.4em; color: #e94560; }
        header p { font-size: 0.85em; color: #aaa; margin-top: 4px; }
        .status-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 6px;
            font-size: 0.8em;
            color: #888;
        }
        .status-bar .ending { color: #ffd700; font-weight: bold; }
        .container {
            display: flex;
            gap: 16px;
            padding: 16px;
            max-width: 1400px;
            margin: 0 auto;
            min-height: calc(100vh - 100px);
        }
        @media (max-width: 900px) {
            .container { flex-direction: column; }
            .sidebar { width: 100% !important; max-height: none !important; }
            .illustration-panel { min-height: 250px !important; }
        }
        .main-panel {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-width: 0;
        }
        .sidebar {
            width: 380px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            max-height: calc(100vh - 116px);
        }
        .panel {
            background: #16213e;
            border-radius: 12px;
            padding: 14px;
        }
        .panel h3 {
            font-size: 0.95em;
            color: #e94560;
            margin-bottom: 10px;
            border-bottom: 1px solid #333;
            padding-bottom: 6px;
        }
        .player-card {
            background: #0f3460;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            display: flex;
            gap: 10px;
        }
        .player-card:last-child { margin-bottom: 0; }
        .player-card .name { font-weight: bold; font-size: 0.95em; margin-bottom: 6px; }
        .player-card .name .class-badge {
            font-size: 0.75em;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 6px;
        }
        .level-badge {
            font-size: 0.7em;
            padding: 1px 6px;
            border-radius: 8px;
            background: #ffd700;
            color: #1a1a2e;
            font-weight: bold;
            margin-left: 4px;
        }
        .class-warrior { background: #e63946; }
        .class-mage { background: #457be0; }
        .class-rogue { background: #2ecc71; }
        .bar-container {
            background: #1a1a2e;
            border-radius: 4px;
            height: 16px;
            margin: 3px 0;
            position: relative;
            overflow: hidden;
        }
        .bar { height: 100%; border-radius: 4px; transition: width 0.5s; }
        .bar-hp { background: linear-gradient(90deg, #e63946, #ff6b6b); }
        .bar-mp { background: linear-gradient(90deg, #457be0, #74b9ff); }
        .bar-xp { background: linear-gradient(90deg, #ffd700, #f0c040); }
        .bar-label {
            position: absolute;
            top: 0; left: 8px;
            font-size: 0.7em;
            line-height: 16px;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
        .stats {
            display: flex;
            gap: 8px;
            margin-top: 6px;
            font-size: 0.75em;
            color: #aaa;
        }
        .stats span { background: #1a1a2e; padding: 2px 6px; border-radius: 4px; }
        .stat-mod { color: #ffd700; font-size: 0.85em; }
        .detail-toggle { display: flex; gap: 4px; margin-top: 6px; }
        .detail-toggle button {
            flex: 1;
            background: #1a1a2e;
            border: 1px solid #333;
            color: #aaa;
            font-size: 0.7em;
            padding: 3px 0;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .detail-toggle button:hover,
        .detail-toggle button.active {
            background: #0f3460;
            color: #ffd700;
            border-color: #ffd700;
        }
        .detail-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            margin-top: 0;
        }
        .detail-content.open {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 6px;
        }
        .detail-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.75em;
            color: #ccc;
        }
        .detail-item:last-child { border-bottom: none; }
        .detail-item:hover { background: rgba(255,255,255,0.05); }
        .detail-item .item-name { flex: 1; }
        .detail-item .item-stat {
            font-size: 0.9em;
            color: #ffd700;
            margin-left: 8px;
            white-space: nowrap;
        }
        .detail-item .tooltip {
            display: none;
            position: fixed;
            background: #0a0a1a;
            border: 1px solid #e94560;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 1.1em;
            color: #ddd;
            z-index: 9999;
            pointer-events: none;
            max-width: 300px;
            line-height: 1.5;
            box-shadow: 0 2px 8px rgba(0,0,0,0.6);
        }
        .rarity-common { color: #aaa; }
        .rarity-uncommon { color: #2ecc71; }
        .rarity-rare { color: #3498db; }
        .rarity-epic { color: #9b59b6; }
        .rarity-legendary { color: #e67e22; }
        .player-portrait {
            width: 125px; height: 125px;
            border-radius: 8px;
            border: 2px solid #333;
            object-fit: cover;
            flex-shrink: 0;
        }
        .player-info { flex: 1; min-width: 0; }
        .illustration-panel {
            position: relative;
            min-height: 400px;
            background: #0d1b2a;
            border-radius: 8px;
            overflow: hidden;
        }
        .illustration-panel img.bg-layer {
            width: 100%; max-height: 500px;
            object-fit: contain;
            display: block; margin: 0 auto;
        }
        .illustration-placeholder {
            display: flex; align-items: center; justify-content: center;
            height: 200px; color: #444; font-size: 1.1em; font-style: italic;
        }
        .events-list { max-height: 300px; overflow-y: auto; font-size: 0.85em; }
        .event-item { padding: 6px 8px; border-bottom: 1px solid #1a1a2e; line-height: 1.4; }
        .event-item .turn-badge {
            display: inline-block; background: #e94560; color: white;
            font-size: 0.7em; padding: 1px 6px; border-radius: 8px; margin-right: 6px;
        }
        .event-item .narrative { display: block; color: #ffd700; font-style: italic; margin-top: 3px; }
        .sidebar-map img {
            width: 100%; height: auto;
            border-radius: 8px; border: 2px solid #333;
        }
        .legend { display: flex; flex-wrap: wrap; gap: 10px; font-size: 0.78em; margin-top: 10px; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid white; }
        .reload-hint { text-align: center; font-size: 0.75em; color: #555; padding: 8px; }
    </style>
</head>
<body>
    <header>
        <h1 id="game-title">TRPG</h1>
        <p id="game-desc"></p>
        <div class="status-bar">
            <span>턴: <strong id="turn-count">-</strong></span>
            <span>챕터: <strong id="chapter-info">-</strong></span>
            <span id="ending-info" class="ending" style="display:none"></span>
        </div>
    </header>

    <div class="container">
        <div class="main-panel">
            <div class="panel illustration-section">
                <h3>일러스트</h3>
                <div id="illustration-panel" class="illustration-panel">
                    <div class="illustration-placeholder">로딩 중...</div>
                </div>
            </div>
            <div class="panel">
                <h3>이벤트 로그</h3>
                <div id="events-list" class="events-list"></div>
            </div>
        </div>

        <div class="sidebar">
            <div class="panel sidebar-map">
                <h3>게임 맵</h3>
                <img id="game-map" src="static/map.png" alt="Game Map">
                <div id="map-legend" class="legend"></div>
            </div>
            <div class="panel">
                <h3>플레이어 정보</h3>
                <div id="players-list"></div>
            </div>
        </div>
    </div>

    <div class="reload-hint">페이지를 새로고침하면 최신 상태로 업데이트됩니다</div>

    <script>
        let rulesData = null;
        let gameState = null;
        const playerDetailCache = {};
        const rarityEmoji = { common: '⬜', uncommon: '🟩', rare: '🟦', epic: '🟪', legendary: '🟧' };

        function statMod(val) {
            const m = Math.floor((val - 10) / 2);
            return m >= 0 ? '+' + m : '' + m;
        }

        function getItemInfo(name) {
            if (rulesData?.combat?.weapons?.[name]) {
                const w = rulesData.combat.weapons[name];
                return { desc: w.description, stat: 'DMG ' + w.dice };
            }
            if (rulesData?.combat?.armor?.[name]) {
                const a = rulesData.combat.armor[name];
                return { desc: a.description || name, stat: a.bonus ? 'DEF +' + a.bonus : '' };
            }
            if (rulesData?.rest?.use_item?.[name]) {
                const u = rulesData.rest.use_item[name];
                return { desc: u.description, stat: u.heal_hp ? 'HP +' + u.heal_hp : u.heal_mp ? 'MP +' + u.heal_mp : '' };
            }
            const fallback = {
                '도둑 도구': { desc: '함정 해제, 자물쇠 따기', stat: 'DEX +2' },
                '마나 결정': { desc: '응축된 마력의 결정', stat: 'MP +5' },
                '슬라임 젤리': { desc: '슬라임에서 추출한 젤리', stat: '소재' },
                '고대 열쇠': { desc: '보물실의 문을 여는 열쇠', stat: '열쇠' },
                '전설의 보물': { desc: '던전의 최종 보물', stat: '보물' },
                '밧줄': { desc: '등반, 묶기에 사용', stat: '도구' },
            };
            return fallback[name] || { desc: name, stat: '' };
        }

        async function loadGame() {
            try {
                const [stateRes, rulesRes] = await Promise.all([
                    fetch('game_state.json'),
                    fetch('rules.json')
                ]);
                gameState = await stateRes.json();
                rulesData = await rulesRes.json();
                renderGame(gameState);
            } catch (e) {
                document.getElementById('game-title').textContent = 'TRPG - 로딩 실패';
                console.error(e);
            }
        }

        function renderGame(state) {
            const info = state.game_info;
            document.getElementById('game-title').textContent = info.title;
            document.getElementById('game-desc').textContent = info.scenario;
            document.getElementById('turn-count').textContent = state.turn_count;
            document.getElementById('chapter-info').textContent = info.current_chapter;

            if (info.ending) {
                const el = document.getElementById('ending-info');
                const endings = { perfect: '완벽한 승리', bittersweet: '쓰라린 승리', retreat: '전략적 후퇴', defeat: '어둠 속으로' };
                el.textContent = endings[info.ending] || info.ending;
                el.style.display = 'inline';
            }

            renderPlayers(state.players, info.scenario_id || 'lost_treasure');
            renderEvents(state.events);
            renderIllustration(info.current_chapter);
            renderLegend(state);
        }

        function renderPlayers(players, scenarioId) {
            const container = document.getElementById('players-list');
            const classMap = { '전사': 'warrior', '마법사': 'mage', '도적': 'rogue' };
            const xpTable = rulesData?.level_up?.xp_table || {};

            container.innerHTML = players.map(p => {
                const cls = classMap[p.class] || 'warrior';
                const hpPct = (p.hp / p.max_hp * 100).toFixed(0);
                const mpPct = (p.mp / p.max_mp * 100).toFixed(0);
                const lv = p.level || 1;
                const xp = p.xp || 0;
                const xpNext = xpTable[String(lv + 1)] || 100;
                const xpPrev = xpTable[String(lv)] || 0;
                const xpPct = xpNext > xpPrev ? ((xp - xpPrev) / (xpNext - xpPrev) * 100).toFixed(0) : 100;
                const effects = (p.status_effects || []).length > 0
                    ? `<div style="font-size:0.75em;color:#ffd700;margin-top:4px">상태: ${p.status_effects.map(e => typeof e === 'string' ? e : e.name).join(', ')}</div>` : '';
                const invItems = (p.inventory || []).map(item => {
                    const info = getItemInfo(item);
                    return `<div class="detail-item"><span class="item-name">${item}</span>${info.stat ? '<span class="item-stat">' + info.stat + '</span>' : ''}<div class="tooltip">${info.desc}</div></div>`;
                }).join('');

                return `
                <div class="player-card">
                    <img class="player-portrait" src="static/portraits/pixel/player_${p.id}.png" alt="${p.name}">
                    <div class="player-info">
                        <div class="name">
                            ${p.name}
                            <span class="class-badge class-${cls}">${p.class}</span>
                            <span class="level-badge">LV ${lv}</span>
                        </div>
                        <div class="bar-container">
                            <div class="bar bar-hp" style="width:${hpPct}%"></div>
                            <div class="bar-label">HP ${p.hp}/${p.max_hp}</div>
                        </div>
                        <div class="bar-container">
                            <div class="bar bar-mp" style="width:${mpPct}%"></div>
                            <div class="bar-label">MP ${p.mp}/${p.max_mp}</div>
                        </div>
                        <div class="bar-container" style="height:10px">
                            <div class="bar bar-xp" style="width:${xpPct}%"></div>
                            <div class="bar-label" style="font-size:0.6em;line-height:10px">XP ${xp}/${xpNext}</div>
                        </div>
                        <div class="stats">
                            <span>STR ${p.stats.STR}<span class="stat-mod">(${statMod(p.stats.STR)})</span></span>
                            <span>DEX ${p.stats.DEX}<span class="stat-mod">(${statMod(p.stats.DEX)})</span></span>
                            <span>INT ${p.stats.INT}<span class="stat-mod">(${statMod(p.stats.INT)})</span></span>
                            <span>CON ${p.stats.CON}<span class="stat-mod">(${statMod(p.stats.CON)})</span></span>
                        </div>
                        ${effects}
                        <div class="detail-toggle">
                            <button onclick="toggleDetail(${p.id}, 'inv', this, '${scenarioId}')">소지품 (${(p.inventory||[]).length})</button>
                            <button onclick="toggleDetail(${p.id}, 'skill', this, '${scenarioId}')">스킬</button>
                            <button onclick="toggleDetail(${p.id}, 'equip', this, '${scenarioId}')">장비</button>
                        </div>
                        <div id="detail-inv-${p.id}" class="detail-content">
                            ${invItems || '<div class="detail-item" style="color:#666">없음</div>'}
                        </div>
                        <div id="detail-skill-${p.id}" class="detail-content">
                            <div class="detail-item" style="color:#666">...</div>
                        </div>
                        <div id="detail-equip-${p.id}" class="detail-content">
                            <div class="detail-item" style="color:#666">...</div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        async function toggleDetail(playerId, type, btn, scenarioId) {
            const el = document.getElementById(`detail-${type}-${playerId}`);
            const isOpen = el.classList.contains('open');

            ['inv', 'skill', 'equip'].forEach(t => {
                const d = document.getElementById(`detail-${t}-${playerId}`);
                if (d) d.classList.remove('open');
            });
            btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));

            if (isOpen) return;

            el.classList.add('open');
            btn.classList.add('active');

            // 엔티티 파일에서 상세 데이터 로드
            if (!playerDetailCache[playerId]) {
                try {
                    const res = await fetch(`entities/${scenarioId}/players/player_${playerId}.json`);
                    playerDetailCache[playerId] = await res.json();
                } catch(e) {
                    playerDetailCache[playerId] = {};
                }
            }

            const detail = playerDetailCache[playerId];

            if (type === 'skill') {
                const actions = rulesData?.actions || {};
                const className = detail.class || '';
                const available = detail.available_actions || [];
                // 사용 가능한 액션만 표시
                const skills = available.map(name => {
                    const info = actions[name];
                    if (!info) return null;
                    const cost = info.cost?.mp ? 'MP ' + info.cost.mp : 'MP 0';
                    let dmgStr = '';
                    if (info.damage) {
                        let dice = info.damage.split(' + ')[0];
                        if (dice.includes('weapon')) {
                            const wep = detail.equipment?.weapon;
                            const wName = typeof wep === 'object' ? wep?.name : wep;
                            const wDef = rulesData?.combat?.weapons?.[wName];
                            dice = wDef ? wDef.dice : '1d2';
                        }
                        dmgStr = ' / ' + dice;
                    }
                    return `<div class="detail-item"><span class="item-name">${name}</span><span class="item-stat">${cost}${dmgStr}</span><div class="tooltip">${info.description || name}</div></div>`;
                }).filter(Boolean);
                el.innerHTML = skills.length ? skills.join('') : '<div class="detail-item" style="color:#666">없음</div>';
            }

            if (type === 'equip') {
                const equip = detail.equipment || {};
                const slotNames = { weapon: '무기', armor: '방어구', accessory: '장신구' };
                el.innerHTML = ['weapon', 'armor', 'accessory'].map(slot => {
                    const item = equip[slot];
                    if (!item) return `<div class="detail-item"><span class="item-name">${slotNames[slot]}: —</span></div>`;
                    if (typeof item === 'string') {
                        const info = getItemInfo(item);
                        return `<div class="detail-item"><span class="item-name">${slotNames[slot]}: ⬜ ${item}</span><span class="item-stat">${info.stat}</span><div class="tooltip">${info.desc}</div></div>`;
                    }
                    const rarity = item.rarity || 'common';
                    const emoji = rarityEmoji[rarity] || '⬜';
                    const props = item.properties || {};
                    const wDef = rulesData?.combat?.weapons?.[item.name];
                    const aDef = rulesData?.combat?.armor?.[item.name];
                    let statStr = wDef ? 'DMG ' + wDef.dice : aDef ? 'DEF +' + aDef.bonus : '';
                    let propParts = [];
                    if (props.attack_bonus) propParts.push('명중+' + props.attack_bonus);
                    if (props.damage_bonus) propParts.push('데미지+' + props.damage_bonus);
                    if (props.defense_bonus) propParts.push('방어+' + props.defense_bonus);
                    if (props.element) propParts.push('🔮' + props.element);
                    const propStr = propParts.length ? ' [' + propParts.join(', ') + ']' : '';
                    const desc = (wDef?.description || aDef?.description || item.name) + propStr;
                    return `<div class="detail-item"><span class="item-name rarity-${rarity}">${slotNames[slot]}: ${emoji} ${item.name}</span><span class="item-stat">${statStr}${propStr}</span><div class="tooltip">${desc}</div></div>`;
                }).join('');
            }
        }

        function renderEvents(events) {
            const container = document.getElementById('events-list');
            container.innerHTML = events.slice(-10).reverse().map(e => {
                const narrative = e.narrative ? `<span class="narrative">${e.narrative}</span>` : '';
                return `<div class="event-item"><span class="turn-badge">T${e.turn}</span>${e.message}${narrative}</div>`;
            }).join('');
        }

        function renderLegend(state) {
            const container = document.getElementById('map-legend');
            const playerColors = { '전사': '#e63946', '마법사': '#457be0', '도적': '#2ecc71' };
            let html = '';
            state.players.forEach(p => {
                html += `<div class="legend-item"><div class="legend-dot" style="background:${playerColors[p.class] || '#fff'}"></div> ${p.name}</div>`;
            });
            container.innerHTML = html;
        }

        function renderIllustration(chapter) {
            const panel = document.getElementById('illustration-panel');
            const chapterBgs = {
                1: 'static/illustrations/sd/ch1_forest.png',
                2: 'static/illustrations/sd/ch2_dungeon.png',
                3: 'static/illustrations/sd/ch3_treasure.png',
                4: 'static/illustrations/sd/background_village_night.webp'
            };
            const pixelBgs = {
                1: 'static/illustrations/pixel/forest.png',
                2: 'static/illustrations/pixel/dungeon.png',
                3: 'static/illustrations/pixel/treasure.png',
                4: 'static/illustrations/pixel/forest.png'
            };
            const bg = chapterBgs[chapter];
            const fallback = pixelBgs[chapter] || pixelBgs[1];
            if (bg) {
                panel.innerHTML = `<img class="bg-layer" src="${bg}" alt="Chapter ${chapter}" onerror="this.src='${fallback}'">`;
            } else {
                panel.innerHTML = '<div class="illustration-placeholder">일러스트 없음</div>';
            }
        }

        // Tooltip events
        document.addEventListener('mouseover', e => { const t = e.target.closest('.detail-item')?.querySelector('.tooltip'); if (t) t.style.display = 'block'; });
        document.addEventListener('mouseout', e => { const t = e.target.closest('.detail-item')?.querySelector('.tooltip'); if (t) t.style.display = 'none'; });
        document.addEventListener('mousemove', e => {
            const t = e.target.closest('.detail-item')?.querySelector('.tooltip');
            if (!t || t.style.display !== 'block') return;
            let x = e.clientX + 15, y = e.clientY + 15;
            const r = t.getBoundingClientRect();
            if (x + (r.width||200) > window.innerWidth - 5) x = e.clientX - (r.width||200) - 10;
            if (y + (r.height||40) > window.innerHeight - 5) y = e.clientY - (r.height||40) - 10;
            t.style.left = Math.max(5, x) + 'px';
            t.style.top = Math.max(5, y) + 'px';
        });

        loadGame();
    </script>
</body>
</html>
